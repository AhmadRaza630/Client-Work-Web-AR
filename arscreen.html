<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Item Detail – Innovify XR AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.05), transparent 22%), linear-gradient(180deg, #04050d 0%, #03050c 45%, #04070e 100%);
      color: #eff2f7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, rgba(249, 115, 22, 0.06), transparent 14%), radial-gradient(circle at 90% 12%, rgba(59, 130, 246, 0.05), transparent 15%);
      pointer-events: none;
    }
    .page {
      position: relative;
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px 34px;
      z-index: 1;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 18px;
    }
    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.65);
      color: #f8fafc;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(15, 23, 42, 0.9); }
    .page-title {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f8fafc;
    }
    .header-spacer { width: 44px; }
    .product-model-wrap {
      position: relative;
      margin-top: 12px;
      border-radius: 32px;
      overflow: hidden;
      background: #090d18;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.34);
    }
    .product-model-wrap model-viewer {
      width: 100%;
      min-height: 360px;
      display: block;
      background: linear-gradient(180deg, #05070f 0%, #0b1320 100%);
    }
    .model-overlay {
      position: absolute;
      left: 16px;
      top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(10, 14, 23, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .model-overlay .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fb923c;
    }
    .product-info {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-top: 24px;
      margin-bottom: 22px;
    }
    .product-details {
      flex: 1;
    }
    .product-name {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1.1;
    }
    .product-price {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #f8fafc;
      opacity: 0.88;
    }
    .product-card {
      padding: 0;
      margin-top: 0;
      border-radius: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
    }
    .product-desc {
      margin: 0 0 22px;
      font-size: 15px;
      line-height: 1.8;
      color: #d9e2f1;
    }
    .view-ar-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 20px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(180deg, #ff8a22 0%, #f97316 100%);
      color: #101828;
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(249, 115, 22, 0.25);
    }
    .view-ar-btn:hover { opacity: 0.97; }

    .section-title {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: capitalize;
      color: #f8fafc;
      font-weight: 700;
    }
    .section-card {
      margin-bottom: 20px;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: none;
    }
    .section-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.75;
      color: #cbd5e1;
    }
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 28px;
    }
    .qty-box {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #f8fafc;
    }
    .qty-box button {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: #f8fafc;
      font-size: 20px;
      cursor: default;
      font-weight: 600;
    }
    .qty-value {
      min-width: 20px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }
    .add-cart-btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #ff8a22 0%, #f97316 100%);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      box-shadow: 0 14px 30px rgba(249, 115, 22, 0.22);
      cursor: pointer;
      white-space: nowrap;
    }
    .add-cart-btn:hover { opacity: 0.96; }
    .hidden-area { display: none !important; }
    @media (max-width: 420px) {
      .page { padding: 18px 14px 28px; }
      .product-model-wrap model-viewer { min-height: 320px; }
      .product-card { margin-top: -18px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a href="index.html" class="back-btn" aria-label="Back">&lt;</a>
      <h1 class="page-title">DETAIL</h1>
      <div class="header-spacer"></div>
    </header>

    <div class="product-model-wrap">
      <model-viewer
        id="viewer"
        src="Burger.glb"
        ar
        ar-modes="scene-viewer quick-look webxr"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral"
        alt="3D food model"
      ></model-viewer>
      <div class="model-overlay"><span class="dot"></span>360°</div>
    </div>

    <div class="product-info">
      <div class="product-details">
        <h2 class="product-name" id="product-name"></h2>
      </div>
      <p class="product-price" id="total-price"></p>
    </div>

    <button type="button" class="view-ar-btn" id="ar-btn">
      View in AR <span class="ar-icon">📱</span>
    </button>

    <div class="product-card">
      <div class="section-card">
        <p class="section-title">Ingredients</p>
        <p class="section-text" id="product-desc"></p>
      </div>
      <div class="section-card">
        <p class="section-title">Description</p>
        <p class="section-text">Our signature product features a premium 3D model with realistic details, perfect for exploring in your space.</p>
      </div>

      <div class="bottom-row">
        <div class="qty-box">
          <button type="button" aria-label="Decrease quantity">−</button>
          <span class="qty-value">1</span>
          <button type="button" aria-label="Increase quantity">+</button>
        </div>
        <button type="button" class="add-cart-btn">ADD TO CART - <span id="cart-price">RS. 950</span></button>
      </div>
    </div>
  </div>

  <script>
    const ITEMS = {
      chair: {
        id: 'chair',
        name: 'Modern Chair',
        desc: 'Comfortable ergonomic chair for your space. Perfect for home or office.',
        price: 2500,
        emoji: '🪑',
        modelGlb: 'Chair.glb',
        modelUsdz: 'Chair.usdz',
        image: 'https://images.unsplash.com/photo-1506439773649-6e0eb8cfb237?w=500&q=80',
        defaultScale: 0.5
      },
      table: {
        id: 'table',
        name: 'Dining Table',
        desc: 'Elegant wooden table for family dinners. Spacious and sturdy.',
        price: 5000,
        emoji: '🪑',
        modelGlb: 'Table.glb',
        modelUsdz: 'Table.usdz',
        image: 'https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=500&q=80',
        defaultScale: 0.5
      },
      bed: {
        id: 'bed',
        name: 'King Size Bed',
        desc: 'Luxurious bed for ultimate comfort. King size with premium mattress.',
        price: 15000,
        emoji: '🛏️',
        modelGlb: 'Bed.glb',
        modelUsdz: 'Bed.usdz',
        image: 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500&q=80',
        defaultScale: 0.5
      },
      beanbag: {
        id: 'beanbag',
        name: 'Bean Bag',
        desc: 'Cozy bean bag for relaxation. Soft and comfortable seating.',
        price: 1200,
        emoji: '🪑',
        modelGlb: 'BeanBag.glb',
        modelUsdz: 'BeanBag.usdz',
        image: 'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500&q=80',
        defaultScale: 0.5
      }
    };

    const params = new URLSearchParams(window.location.search);
    const itemKey = (params.get('item') || 'chair').toLowerCase();
    const currentItem = ITEMS[itemKey] || ITEMS.chair;

    const productName = document.getElementById('product-name');
    const productDesc = document.getElementById('product-desc');
    const totalPriceEl = document.getElementById('total-price');
    const cartPriceEl = document.getElementById('cart-price');
    const arBtn = document.getElementById('ar-btn');
    const viewer = document.getElementById('viewer');
    const sizeMinusBtn = document.getElementById('size-minus');
    const sizePlusBtn = document.getElementById('size-plus');
    const sizeValueEl = document.getElementById('size-value');

    // Torch (flashlight) control state
    let torchStream = null;
    let torchTrack = null;

    async function enableTorch() {
      if (!('mediaDevices' in navigator)) return;
      try {
        // If already on, skip
        if (torchTrack && torchTrack.readyState === 'live') {
          try {
            await torchTrack.applyConstraints({ advanced: [{ torch: true }] });
          } catch (_) {}
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            advanced: [{ torch: true }]
          }
        });

        const [track] = stream.getVideoTracks();
        if (!track) {
          stream.getTracks().forEach(t => t.stop());
          return;
        }

        try {
          await track.applyConstraints({ advanced: [{ torch: true }] });
        } catch (e) {
          // Torch not supported, just stop stream
          stream.getTracks().forEach(t => t.stop());
          return;
        }

        torchStream = stream;
        torchTrack = track;
      } catch (e) {
        // Permission denied or not supported – ignore silently
      }
    }

    async function disableTorch() {
      try {
        if (torchTrack) {
          try {
            await torchTrack.applyConstraints({ advanced: [{ torch: false }] });
          } catch (_) {}
          torchTrack.stop();
        }
        if (torchStream) {
          torchStream.getTracks().forEach(t => t.stop());
        }
      } finally {
        torchTrack = null;
        torchStream = null;
      }
    }

    var modelScale = currentItem.defaultScale !== undefined ? currentItem.defaultScale : 0.5;
    var scaleMin = 0.1;
    var scaleMax = 2;
    var scaleStep = 0.05;

    function applyScale() {
      var s = modelScale.toFixed(2);
      var scaleStr = s + ' ' + s + ' ' + s;
      viewer.setAttribute('scale', scaleStr);
      sizeValueEl.textContent = s;
      if (viewer.updateFraming) viewer.updateFraming();
    }

    sizeMinusBtn.addEventListener('click', function () {
      modelScale = Math.max(scaleMin, modelScale - scaleStep);
      applyScale();
    });
    sizePlusBtn.addEventListener('click', function () {
      modelScale = Math.min(scaleMax, modelScale + scaleStep);
      applyScale();
    });

    productName.textContent = currentItem.name;
    productDesc.textContent = currentItem.desc;
    totalPriceEl.textContent = 'Rs ' + currentItem.price;
    if (cartPriceEl) cartPriceEl.textContent = 'Rs ' + currentItem.price;

    // Model formats:
    // - Android/desktop: GLB via `src`
    // - iOS Quick Look: USDZ via `ios-src`
    if (currentItem.modelGlb) viewer.setAttribute('src', currentItem.modelGlb);
    if (currentItem.modelUsdz) viewer.setAttribute('ios-src', currentItem.modelUsdz);
    applyScale();
    viewer.addEventListener('load', function () { applyScale(); });

    // AR screen par enter/exit hote hi torch control karein
    viewer.addEventListener('ar-status', function (event) {
      const status = event.detail && event.detail.status;
      if (status === 'session-started') {
        // AR start hua – flashlight on karne ki koshish
        enableTorch();
      } else if (status === 'not-presenting') {
        // AR se bahar aaye – flashlight off
        disableTorch();
      }
    });

    window.addEventListener('pagehide', disableTorch);
    window.addEventListener('beforeunload', disableTorch);

    document.querySelectorAll('.size-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.size-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
      });
    });

    arBtn.addEventListener('click', function () {
      if (viewer.canActivateAR) {
        viewer.activateAR();
      } else {
        alert('Is device/browser par AR available nahi hai. HTTPS + Android Chrome ya iOS Safari try karein.');
      }
    });
  </script>
</body>
</html>
